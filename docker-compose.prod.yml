version: '3.8'

# [Ambiente: PRODUÇÃO / STAGING]
# Imagens imutáveis empacotadas via Github Actions. Exige builds isolados.

services:
  nginx:
    image: nginx:alpine
    container_name: finanhub_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - finanhub_net_prod

  db:
    image: postgres:15-alpine
    container_name: finanhub_db_prod
    restart: always
    env_file: .env.prod
    volumes:
      - finanhub_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finanhub_net_prod

  redis:
    image: redis:7-alpine
    container_name: finanhub_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finanhub_net_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: finanhub_backend_prod
    restart: always
    env_file: .env.prod
    command: npm run start:prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - finanhub_net_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: finanhub_frontend_prod
    restart: always
    env_file: .env.prod
    command: npm run start
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finanhub_net_prod

volumes:
  finanhub_pgdata_prod:

networks:
  finanhub_net_prod:
    driver: bridge
