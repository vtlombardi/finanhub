name: Bug Report
description: Report a bug. PRs are STRONGLY preferred — see below.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🛑 Read this before filing.

        **This is a developer tool that runs on 11 platforms (Claude Code, Gemini CLI, VS Code Copilot, OpenCode, Kiro, Cursor, Codex CLI, Zed, Antigravity, OpenClaw, Pi) across 3 operating systems (macOS, Linux, Windows). It is maintained by one person. I cannot reproduce every platform-specific edge case.**

        ### 🔧 PRs > Issues. Always.

        You're using an AI coding agent. You have the most powerful debugging tool in history sitting right there. Use it:

        1. **Reproduce the bug** with a specific prompt (paste it below)
        2. **Ask your agent to debug it**: _"Read the context-mode hooks source and find why this error occurs"_
        3. **Write a failing test** (RED) and fix it (GREEN) — see [CONTRIBUTING.md](https://github.com/mksglu/context-mode/blob/main/CONTRIBUTING.md)
        4. **Open a PR** against `main` branch — CI verifies on Ubuntu, macOS, and Windows

        **Opening an issue does NOT guarantee a fix.** I welcome issues for discussion and triage, but the fastest path to resolution is a PR. If you can describe the bug, your AI agent can fix it.

        ### When an issue (not PR) is acceptable

        - You genuinely tried to fix it and couldn't (show what you tried)
        - The bug is in core architecture, not a platform-specific edge case
        - You provide: exact prompt, full error log, doctor output, repro steps

        **Issues without reproduction steps will be closed.**

        ---

        **Before you file:**
        1. [Search existing issues](https://github.com/mksglu/context-mode/issues)
        2. Run `/context-mode:ctx-upgrade` and restart your session
        3. If the issue persists on the latest version, fill out every field below

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which AI agent platform are you using?
      options:
        - Claude Code
        - Gemini CLI
        - VS Code Copilot
        - OpenCode / Kilo Code
        - Cursor
        - Kiro
        - Codex CLI
        - Zed
        - Google Antigravity
        - OpenClaw / Pi Agent
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: context-mode version
      description: |
        Run `/context-mode:ctx-doctor` (Claude Code) or ask the model to call the `stats` tool.
        Must be the latest. If not, upgrade first.
      placeholder: "e.g. 0.9.23"
    validations:
      required: true

  - type: textarea
    id: doctor-output
    attributes:
      label: Full doctor output (REQUIRED)
      description: |
        Run `/context-mode:ctx-doctor` and paste the COMPLETE output here.
        Must be on the LATEST version. If not latest, upgrade first.
        **Issues without doctor output will be closed immediately.**
      render: text
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Exact prompt that triggered the bug (REQUIRED)
      description: |
        Copy-paste the EXACT message you sent to the agent when the bug occurred.
        Not a summary — the literal prompt text. Without this, we cannot reproduce.
        **Issues without a prompt will be closed.**
      placeholder: |
        Example: "Read the file src/index.ts and explain what it does"
      render: text
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Full error output (REQUIRED)
      description: |
        Expand the error with Ctrl+O (Claude Code) and paste the COMPLETE error.
        Include tool name, error message, and any stack trace.
        **"It doesn't work" is not an error output.**
      render: text
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce (REQUIRED)
      description: |
        Minimal steps so anyone on your platform can reproduce this.
      placeholder: |
        1. Install: npm install -g context-mode@1.0.50
        2. Configure: (paste your mcp config)
        3. Send prompt: "..."
        4. See error: "..."
    validations:
      required: true

  - type: textarea
    id: what-you-tried
    attributes:
      label: What have you tried to fix it?
      description: |
        Did you try to debug it? What did you find?
        Remember: your AI agent can read our source code. Ask it to help.
      placeholder: |
        - Upgraded to latest version
        - Read hooks/pretooluse.mjs, found that...
        - Tried running the hook manually: node hooks/pretooluse.mjs <<< '...'
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I am on the LATEST version (ran ctx-upgrade)
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I tried to debug this myself (read source, ran hooks manually, etc.)
          required: true
        - label: I understand that PRs are preferred and issues don't guarantee a fix
          required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - Windows (Native)
        - Windows (WSL)
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: JS Runtime
      description: "Bun or Node version (shown in doctor output)"
      placeholder: "e.g. bun 1.3.4"
    validations:
      required: false
